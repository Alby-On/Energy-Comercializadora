<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Productos | Energy Comercializadora</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/header.css">
    <link rel="stylesheet" href="css/footer.css">
    <link rel="stylesheet" href="css/productos.css">
    
</head>
<body>
    <div id="header-placeholder"></div>

    <main class="container-full" style="padding-top: 235px; padding-bottom: 80px;">
    
    <section class="productos-header">
        <h1>Nuestro Catálogo</h1>
        <p>Suministros eléctricos cargados en tiempo real.</p>
        <div class="linea-decorativa"></div>
    </section>

    <div class="productos-layout">
        
        <aside class="productos-sidebar">
        <div class="filter-group">
        <h3>Categorías</h3>
        <ul id="menu-categorias" class="filter-list">
            </ul>
        </div>
        </aside>

        <div class="productos-content">
            <div id="productos-dinamicos" class="productos-grid">
                <div class="loading-state">
                    <p>Cargando productos de Energy SPA...</p>
                </div>
            </div>
        </div>

    </div>
</main>

    <div id="footer-placeholder"></div>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <script src="js/supabase.js"></script> 

    <script src="js/productos-db.js"></script>

    <script src="js/components.js"></script>
</body>
</html>
