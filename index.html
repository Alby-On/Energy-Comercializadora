<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Energy Comercializadora</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/header.css">
    <link rel="stylesheet" href="css/footer.css">
    
</head>
<body>

    <div id="header-placeholder"></div>
    <section id="inicio" class="hero-container" style="padding-top: 235px;">
    <div class="swiper hero-slider">
        <div class="swiper-wrapper">
            <div class="swiper-slide" style="background-image: url('images/banners/banner1.webp');"></div>
            <div class="swiper-slide" style="background-image: url('images/banners/banner2.webp');"></div>
            <div class="swiper-slide" style="background-image: url('images/banners/banner3.webp');"></div>
            <div class="swiper-slide" style="background-image: url('images/banners/banner4.webp');"></div>
            <div class="swiper-slide" style="background-image: url('images/banners/banner5.webp');"></div>
        </div>

        <div class="swiper-pagination"></div>
        <div class="swiper-button-next"></div>
        <div class="swiper-button-prev"></div>
    </div>
    </section>

    <section class="destacados-categoria py-5">
    <div class="container-energy">
        <div class="header-destacados">
            <h2>Iluminación Destacada</h2>
            <p>Las mejores soluciones para tus proyectos en Chillán</p>
        </div>
        
        <div id="productos-destacados-grid" class="productos-grid">
            <div class="loading-spinner">Cargando productos destacados...</div>
        </div>

        <div class="text-center mt-4">
            <a href="productos.html?categoria=iluminacion" class="btn-ver-mas">Ver todo Iluminación</a>
        </div>
    </div>
    </section>
    
    <div id="footer-placeholder"></div>
    <div id="cart-placeholder"></div>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>

    <script src="js/supabase.js"></script> 
    <script src="js/productos-db.js"></script>
    
    <script src="js/components.js"></script>
    <script src="js/carro_compras.js"></script>
    <script src="js/main.js"></script>

    <script>
    // Se ejecuta solo cuando todo lo anterior (librería + html) está listo
    window.onload = function() {
        const swiper = new Swiper('.hero-slider', {
            loop: true,
            effect: 'fade',
            speed: 1000,
            autoplay: {
                delay: 3000,
                disableOnInteraction: false,
            },
            pagination: {
                el: '.swiper-pagination',
                clickable: true,
            },
            navigation: {
                nextEl: '.swiper-button-next',
                prevEl: '.swiper-button-prev',
            },
        });
        console.log("Swiper inicializado correctamente");
    };
    </script>
    </body>
</html>
